name: Mandalart
options:
  bundleIdPrefix: jp.mandalart.app
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  Mandalart:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Mandalart
        excludes:
          - "Resources/help/.gitkeep"
          - "Services/Secrets.swift.template"
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.mandalart.app.ios
        PRODUCT_NAME: Mandalart
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: MandalArt
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  # vault ピュア層 (Phase 2 Stage 0/1 移植) のユニットテスト専用ターゲット。
  # app ターゲット (= Supabase リンク) に依存させず、ピュア層 (Foundation + CryptoKit のみ) と
  # GridConstants だけを直接コンパイルする。これで `xcodebuild test` を VaultTests スキームで
  # 回しても Supabase をビルドせず、落とし穴 #1 (SPM 依存で Simulator destination を見失う) を踏まない。
  MandalartTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MandalartTests
      - path: Mandalart/Vault
      - path: Mandalart/Utils/Constants.swift
      - path: Mandalart/Utils/IDGenerator.swift
      # Stage DB: in-memory SwiftData テスト用に @Model + vault の DB 層を直接コンパイル
      # (いずれも Foundation/SwiftData のみ・Supabase 非リンク維持)。
      - path: Mandalart/Models
      - path: Mandalart/Services/VaultRowsBridge.swift
      - path: Mandalart/Services/VaultDbApply.swift
      - path: Mandalart/Services/VaultDbReconcile.swift
      - path: Mandalart/Services/VaultExitSync.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.mandalart.app.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
schemes:
  # MandalartTests だけをビルド/テストするスキーム (app・Supabase を巻き込まない logic test)。
  # 実行例: xcodebuild test -scheme VaultTests -destination 'platform=iOS Simulator,name=iPhone 16'
  VaultTests:
    build:
      targets:
        MandalartTests: [test]
    test:
      targets:
        - MandalartTests
