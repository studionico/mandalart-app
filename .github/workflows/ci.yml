name: CI

# 通常の push と PR で静的検査・テストを走らせる。
# Rust ビルドは重いので release.yml (tag push) にのみ任せ、ここでは
# フロントエンドの typecheck / lint / test / vite build だけを確認する。

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        # husky の prepare script が git 未検出時に失敗するのを回避
        run: npm ci --ignore-scripts

      - name: Rebuild native modules (better-sqlite3 の prebuilt binary 取得)
        # `--ignore-scripts` で skip された install scripts を better-sqlite3 についてだけ
        # 個別実行する。prebuilt binary が GitHub Releases から DL されるので 5-10 秒で完了。
        # husky 等の他の prepare script は走らない (npm rebuild は対象パッケージ限定なので安全)。
        run: npm rebuild better-sqlite3

      - name: Codegen drift check (shared/constants → 生成物が最新か)
        # 単一ソース (shared/constants/*.json) から定数を再生成し、commit 済みの生成物と差分が無いか検証する。
        # 差分があれば「単一ソースを変えたのに codegen を実行/commit していない」= ドリフトなので CI red。
        run: |
          npm run codegen
          git diff --exit-code -- src/constants/colors.generated.ts ../ios/Mandalart/Utils/PresetColors.generated.swift \
            || { echo "::error::codegen 生成物が古い。'cd desktop && npm run codegen' を実行して commit してください"; exit 1; }

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (Vite only)
        # Supabase env は CI では未設定でも起動できる (client.ts がフォールバック)
        run: npm run build
