name: iOS CI

# iOS の vault ピュア層ユニットテスト (VaultTests スキーム) を回す。
# VaultTests は Supabase を非リンクなので Simulator destination を見失う落とし穴 #1 を踏まず、
# Secrets.swift も不要 (app ターゲットを巻き込まないため)。macOS runner は分課金が重いので
# iOS 関連の変更時のみ起動する。Rust/Tauri と desktop フロントエンドは ci.yml が担当。

on:
  push:
    branches: ['**']
    paths:
      - 'ios/**'
      # 共有 golden fixture (両OS契約) の変更でも iOS 側を検証する。これが無いと
      # shared/vault-fixtures/** だけ変えたとき iOS VaultTests が走らず契約乖離を取りこぼす。
      - 'shared/vault-fixtures/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    paths:
      - 'ios/**'
      - 'shared/vault-fixtures/**'
      - '.github/workflows/ios-ci.yml'

jobs:
  vault-tests:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        # runner にインストール済みの最新 Xcode を選ぶ。simctl と xcodebuild が同じ developer dir を
        # 使うことで「simctl では見える simulator を xcodebuild が見つけられない」食い違いを防ぐ
        # (固定 Xcode_16.app は runtime 未同梱のことがあり iOS 18.0 not installed で失敗した)。
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $LATEST"
          sudo xcode-select -switch "$LATEST"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve iOS Simulator udid
        # 選択した Xcode で利用可能な iPhone Simulator の udid を 1 つ解決し、name 指定の曖昧さ
        # (同名で複数 OS) を避けて udid で固定する。runtime / 一覧もログに残す (イメージ更新時のデバッグ用)。
        run: |
          xcrun simctl list runtimes
          xcrun simctl list devices available | grep -i iphone || true
          SIM_ID=$(xcrun simctl list devices available -j \
            | python3 -c 'import json,sys; d=json.load(sys.stdin)["devices"]; ids=[x["udid"] for rt in d for x in d[rt] if x.get("isAvailable") and "iPhone" in x["name"]]; print(ids[0] if ids else "")')
          test -n "$SIM_ID" || { echo "No iPhone simulator available"; exit 1; }
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"
          echo "Using simulator udid: $SIM_ID"

      - name: Run VaultTests
        run: |
          xcodebuild test \
            -scheme VaultTests \
            -destination "platform=iOS Simulator,id=$SIM_ID"
